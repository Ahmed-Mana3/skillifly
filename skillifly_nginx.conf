# =============================================================================
#  Skillifly — Nginx Configuration
#  File: /etc/nginx/sites-available/skillifly
#
#  TWO server blocks:
#    1. skillifly.cloud (HTTPS, managed by Certbot — DO NOT EDIT that section)
#    2. Catch-all for custom domains (HTTP initially, Certbot adds HTTPS per-domain)
#
#  DEPLOY:
#    sudo cp skillifly_nginx.conf /etc/nginx/sites-available/skillifly
#    sudo nginx -t && sudo systemctl reload nginx
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# 1. Main site — skillifly.cloud (HTTPS)
#    Certbot manages the SSL lines. Do not manually edit the "managed by Certbot"
#    comments or it will break auto-renewal.
# ─────────────────────────────────────────────────────────────────────────────
server {
    server_name skillifly.cloud www.skillifly.cloud;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location /static/ {
        alias /var/www/skillifly/staticfiles/;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/skillifly/media/;
        expires 7d;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/skillifly.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/skillifly.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}


# ─────────────────────────────────────────────────────────────────────────────
# 2. HTTP → HTTPS redirect for skillifly.cloud
#    (Certbot generated this, cleaned up the duplicate if-block)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name skillifly.cloud www.skillifly.cloud;
    client_max_body_size 100M;

    if ($host = www.skillifly.cloud) {
        return 301 https://$host$request_uri;
    }

    if ($host = skillifly.cloud) {
        return 301 https://$host$request_uri;
    }

    return 404;
}


# ─────────────────────────────────────────────────────────────────────────────
# 3. CUSTOM DOMAINS — Catch-all for any domain pointing to this server
#    This is the block that fixes the 400 Bad Request.
#
#    When a user points ahmed.com → 157.245.240.23 via an A record,
#    Nginx receives the request with Host: ahmed.com.  Without this block,
#    Nginx has no matching server_name and returns 400.
#
#    With this block, Nginx forwards the request to Django where
#    CustomDomainMiddleware handles the routing.
#
#    After DNS verification, run:
#      sudo certbot --nginx -d ahmed.com
#    to add HTTPS for that specific domain.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # "_" matches ANY hostname not matched by the blocks above.
    server_name _;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8000;

        # CRITICAL: Pass the real Host header so Django's
        # CustomDomainMiddleware can identify the custom domain.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  300;
        proxy_send_timeout  300;
    }

    # Custom domains share the same static/media files
    location /static/ {
        alias /var/www/skillifly/staticfiles/;
        autoindex off;
        expires 30d;
    }

    location /media/ {
        alias /var/www/skillifly/media/;
        expires 7d;
    }
}
