{% extends "core/base.html" %}
{% load static %}

{% block title %}Page Not Found — Skillifly{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-6 text-center">
  <div class="animate-fadeInUp">
    <div class="w-20 h-20 gradient-brand rounded-2xl mx-auto mb-6 flex items-center justify-center" style="opacity: 0.9;">
      <img src="{% static 'img/bird.png' %}" alt="Skillifly" class="h-12 w-12 object-contain animate-float">
    </div>
    <p class="text-6xl font-bold gradient-text mb-3" style="font-family: 'Syne', sans-serif;">404</p>
    <h1 class="text-2xl font-bold mb-3" style="font-family: 'Syne', sans-serif;">This page has flown away</h1>
    <p class="text-gray-500 mb-8 max-w-sm mx-auto">The page you're looking for doesn't exist or may have been moved.</p>
    <div class="flex items-center justify-center gap-4">
      <a href="{% url 'index' %}" class="btn-primary">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Go home
      </a>
      <a href="{% url 'dashboard' %}" class="btn-ghost">Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
